name: Daily DevSync Update

on:
  schedule:
    # Runs at 05:30 UTC every day
    - cron: '30 5 * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log file for 23f2000118@ds.study.iitm.ac.in
        run: |
          echo "Last automated update: $(date)" > daily_status.txt

      - name: Commit and Push changes
        run: |
          git config --local user.email "23f2000118@ds.study.iitm.ac.in"
          git config --local user.name "DevSync Automation"
          git add daily_status.txt
          git commit -m "Automated daily status update [skip ci]"
          git push
